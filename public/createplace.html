<body>
    <h1 style="padding: 35px;">Add New Vehicle</h1>
    <div class="greenville-form-wrapper">
    <form id="vehicleForm" action="/api/maps">
        <div class="left-form">
            <h2>ID</h2>
            <input style="cursor: not-allowed;" type="text" name="vehicle-id" id="id" placeholder="Vehicle ID will automatically filled" disabled>

            <h2>Vehicle Name</h2>
            <input type="text" name="vehicle-name" id="car_name" placeholder="Full Vehicle Name" required />

            <h2>Brand</h2>
            <input type="text" name="vehicle-brand" id="brand" placeholder="None of these one" required>

            <h2>Vehicle Type</h2>
            <input type="text" name="vehicle-type" id="type" placeholder="Based on Vehicle shape" required>

            <h2>Category</h2>
            <input type="text" name="vehicle-category" id="category" placeholder="Choose Vehicle Category" required />

            <h2>Add Colour</h2>
            <input type="text" name="vehicle-color" id="colors">
        </div>

        <div class="right-form" data-aos="fade-left" data-aos-duration="1000">
            <h2>Fuel Type</h2>
            <input type="text" name="fuel-type" id="fuel" required>

            <h2>Based Price</h2>
            <input type="number" name="vehicle-price" id="price" placeholder="Take a Range from $1.000 - 3.500.000" required />

            <h2>Top Speed (MPH)</h2>
            <input type="number" name="top-speed" id="topSpeed" placeholder="Took from the highest Speed can reach (Sport Mode)" required>

            <h2>Overview (.obj or .fib only)</h2>
            <div class="upload-box" id="uploadBox">
                <div class="upload-file" id="uploadText">
                    <div class="upload-icon"><i class="fa-solid fa-folder-plus"></i></div>
                    Drag & drop your choosen file
                </div>
                <input type="file" name="image" id="image" hidden/>
            </div>

            <h2>Author</h2>
            <input type="number" name="author" id="authorId">

            <p>Column with asterisk (*) are required to fill</p>
            <button type="submit" id="submit" value="submit">Add New Vehicle</button>
        </div>
    </form>
    </div>

    <script>
    document.getElementById("vehicleForm").addEventListener("submit", async (e) => {
    e.preventDefault();

    try {
        const formData = new FormData();

        formData.append("car_name", document.getElementById("car_name").value);
        formData.append("brand", document.getElementById("brand").value);
        formData.append("type", document.getElementById("type").value);
        formData.append("category", document.getElementById("category").value);
        formData.append("fuel", document.getElementById("fuel").value);
        formData.append("colors", document.getElementById("colors").value);
        formData.append("price", document.getElementById("price").value);
        formData.append("topSpeed", document.getElementById("topSpeed").value);
        formData.append("authorId", document.getElementById("authorId").value);

        const fileInput = document.getElementById("image");

        formData.append("image", fileInput.files[0]);

        const res = await fetch("/api/maps", {
        method: "POST",
        body: formData
        });

        const data = await res.json();

        if (!res.ok) {
        throw new Error(data.message || "Gagal menambahkan vehicle");
        }

        console.log(data);
        alert("Vehicle berhasil ditambahkan!");

        document.getElementById("vehicleForm").reset();

    } catch (err) {
        console.error(err);
        alert("Terjadi kesalahan: " + err.message);
    }
    });
    </script>

    <script>
    const uploadBox = document.getElementById("uploadBox");
    const fileInput = document.getElementById("image");
    const uploadText = document.getElementById("uploadText");

    let selectedFile = null;

    uploadBox.addEventListener("click", () => {
    fileInput.click();
    });

    fileInput.addEventListener("change", () => {
    if (fileInput.files.length > 0) {
        selectedFile = fileInput.files[0];
        showFileName(selectedFile);
    }
    });

    // drag over
    uploadBox.addEventListener("dragover", (e) => {
    e.preventDefault();
    uploadBox.classList.add("dragover");
    });

    // drag leave
    uploadBox.addEventListener("dragleave", () => {
    uploadBox.classList.remove("dragover");
    });

    // drop file
    uploadBox.addEventListener("drop", (e) => {
    e.preventDefault();
    uploadBox.classList.remove("dragover");

    const file = e.dataTransfer.files[0];
    if (file) {
        selectedFile = file;
        fileInput.files = e.dataTransfer.files;
        showFileName(file);
    }
    });

    function showFileName(file) {
    if (file.type.startsWith("image/")) {
    const previewURL = URL.createObjectURL(file);

    uploadText.innerHTML = `
        <img src="${previewURL}" style="max-width:70%" />
        <small>Click or drop to change</small>
        `;
    } else {
        uploadText.innerHTML = `
        <p><strong>${file.name}</strong></p>
        <small>File uploaded! Click or drop to change</small>
        `;
    }
    }
    </script>
</body>
</html>
