<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Greenville | Maps</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="icon" type="image/webp" href="images/favicon.webp">
</head>
<body>
    <nav class="navbar">
    <div class="logo"><a href="/home">Greenville</a></div>
    <ul class="nav-links">
        <li><a href="/home">Home</a></li>
        <li class="active">Map</li>
        <li><a href="/vehicle">Vehicles</a></li>
        <li><a href="/job">Jobs</a></li>
        <li><a href="/wiki">Wiki</a></li>
    </ul>
    </nav>

    <section class="quick-map">
      <div class="spawn-container" id="maps-list"></div>
    </section>

    <main class="grid" id="maps-list">
      <div id="loading" class="loading">
    <p>Loading Maps List...</p>
  </div>
  </main>

<script>
let lastScroll = 0;
const navbar = document.querySelector('.navbar');

window.addEventListener('scroll', () => {
  let currentScroll = window.pageYOffset;

  if (currentScroll > lastScroll && currentScroll > 100) {
    navbar.classList.add('hide');
  } else {
    navbar.classList.remove('hide');
  }

  lastScroll = currentScroll;
});

window.addEventListener("DOMContentLoaded", async () => {
  try {
    const res = await fetch("/api/maps");
    const maps = await res.json();

    const container = document.getElementById("maps-list");

    if (!container) {
      console.error("maps-list tidak ditemukan");
      return;
    }

    const loadingEl = document.getElementById("loading");
    if (loadingEl) loadingEl.remove();

    document.getElementById("loading")

    const category = maps.length ? maps[0].place_category : "No Category";

    container.innerHTML = "";

    const spawnhead = document.createElement("div");
    spawnhead.classList.add("spawnhead");

    spawnhead.innerHTML = `
      <h1>${maps[0]?.place_category || ""}</h1>
      <p>You can choose the spot where would you stand for the first time you play!</p>
    `;

    container.appendChild(spawnhead);

    const cardsContainer = document.createElement("div");
    cardsContainer.classList.add("category");

    container.appendChild(cardsContainer);

    maps.forEach(map => {
    const card = document.createElement("div");
    card.classList.add("quick-card");
    card.style.background = `url(/${map.place_image}) center/cover no-repeat`;

    card.innerHTML = `
      <h3>${map.place_name}</h3>
      <p>${map.place_desc}</p>
    `;

      card.addEventListener("click", () => {
        window.location.href = `/maps-details?id=${map.place_id}+name=${encodeURIComponent(map.place_name)}+category=${map.place_category}`;
      });

      container.appendChild(card);
    });

    loadingEl.classList.add("done");

    setTimeout(() => {
      loadingEl.remove();
    }, 300);

  } catch (err) {
    console.error("Error load maps:", err);
  }
});

</script>

</body>
</html>
