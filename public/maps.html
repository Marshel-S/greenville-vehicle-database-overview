<body>
    <nav class="navbar">
    <div class="logo"><a href="/home">Greenville</a></div>
    <ul class="nav-links">
        <li><a href="/home">Home</a></li>
        <li class="active">Map</li>
        <li><a href="/vehicle">Vehicles</a></li>
        <li><a href="/job">Jobs</a></li>
        <li><a href="/wiki">Wiki</a></li>
    </ul>
    </nav>

    <main id="maps-list">
      <div id="loading" class="loading">
    <p>Loading Maps List...</p>
  </div>
  </main>

<script>
let lastScroll = 0;
const navbar = document.querySelector('.navbar');

window.addEventListener('scroll', () => {
  let currentScroll = window.pageYOffset;

  if (currentScroll > lastScroll && currentScroll > 100) {
    navbar.classList.add('hide');
  } else {
    navbar.classList.remove('hide');
  }

  lastScroll = currentScroll;
});

async function loadMaps() {
  try {
    const res = await fetch("/api/maps");
    const maps = await res.json();

    const container = document.getElementById("maps-list");
    if (!container) return;

    const loadingEl = document.getElementById("loading");

    const grouped = {};
    maps.forEach(map => {
      if (!grouped[map.place_category]) {
        grouped[map.place_category] = [];
      }
      grouped[map.place_category].push(map);
    });

    Object.entries(grouped).forEach(([category, items]) => {
      const section = document.createElement("section");
      section.classList.add("map-section");

      section.innerHTML = `
        <div class="spawnhead">
          <h1>${category}</h1>
          <p>${items[0].category?.place_category_desc || ""}</p>
        </div>
        <div class="spawn-container"></div>
      `;

      const cardContainer = section.querySelector(".spawn-container");

      items.forEach(map => {
        const card = document.createElement("div");
        card.classList.add("quick-card");
        card.style.background = `url(/${map.place_image}) center/cover no-repeat`;
        card.innerHTML = `
          <h3>${map.place_name}</h3>
          <p>${map.place_desc}</p>
        `;
        card.addEventListener("click", () => {
          window.location.href = `/maps-details?id=${map.place_id}&name=${encodeURIComponent(map.place_name)}&category=${map.place_category}`;
        });
        cardContainer.appendChild(card);
      });

      container.appendChild(section);
    });

    if (loadingEl) {
      loadingEl.classList.add("done");
      setTimeout(() => loadingEl.remove(), 300);
    }

  } catch (err) {
    console.error("Error load maps:", err);
  }
}

loadMaps();
</script>
