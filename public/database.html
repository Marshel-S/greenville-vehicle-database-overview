<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Greenville | Vehicle</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="icon" type="image/webp" href="images/favicon.webp">
</head>
<body>

  <!-- Navbar -->
  <nav class="navbar">
  <div class="logo"><a href="/home">Greenville</a></div>
  <ul class="nav-links">
    <li><a href="/home">Home</a></li>
    <li><a href="/maps">Map</a></li>
    <li class="active">Vehicles</li>
    <li><a href="/job">Jobs</a></li>
    <li><a href="/wiki">Wiki</a></li>
  </ul>
  </nav><br>

  <!-- Header -->
  <header class="header">
    <h1>Vehicle Database</h1>
    <input type="text" placeholder="Search vehicle...">
  </header>

  <!-- Main -->
  <div class="container">

    <!-- Sidebar -->
    <aside class="sidebar">
      <h3>Filter</h3>

      <label>Brand</label>
      <select>
        <option>All</option>
        <option>Falcon</option>
        <option>Vortex</option>
      </select>

      <label>Type</label>
      <select>
        <option>All</option>
        <option>SUV</option>
        <option>Sport</option>
        <option>Truck</option>
      </select>

      <label>Max Price</label>
      <input type="range" min="0" max="100000">

      <button>Apply</button>
    </aside>

    <!-- Content -->
    <main class="grid">

      <!-- Card -->
      <div class="card">
        <h2>Falcon GT</h2>
        <p>$25,000</p>
        <span>Top Speed: 180 mph</span>
        <button>Details</button>
      </div>

      <div class="card">
        <h2>Vortex X</h2>
        <p>$40,000</p>
        <span>Top Speed: 200 mph</span>
        <button>Details</button>
      </div>

      <div class="card">
        <h2>Ranger SUV</h2>
        <p>$30,000</p>
        <span>Top Speed: 150 mph</span>
        <button>Details</button>
      </div>

    </main>
  </div>

  <script>
let lastScroll = 0;
const navbar = document.querySelector('.navbar');

window.addEventListener('scroll', () => {
  let currentScroll = window.pageYOffset;

  if (currentScroll > lastScroll && currentScroll > 50) {
    navbar.classList.add('hide');
  } else {
    navbar.classList.remove('hide');
  }

  lastScroll = currentScroll;
});
</script>

</body>
</html>
