<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Greenville | Vehicle</title>
  <link rel="stylesheet" href="/style=Wfnh7Lhqm0pX4">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="icon" type="image/webp" href="images/favicon.webp">
</head>
<body>

  <nav class="navbar">
  <div class="logo"><a href="/home">Greenville</a></div>
  <ul class="nav-links">
    <li><a href="/home">Home</a></li>
    <li><a href="/maps">Map</a></li>
    <li class="active">Vehicles</li>
    <li><a href="/job">Jobs</a></li>
    <li><a href="/wiki">Wiki</a></li>
  </ul>
  </nav><br>

  <header class="header">
    <h1>Vehicle Database</h1>
    <input id="search" type="text" placeholder="Search vehicle...">
  </header>

  <div class="container">

    <aside class="sidebar">
      <h3>Filter</h3>

      <label>Brand</label>
      <select id="brand"></select>

      <label>Type</label>
      <select id="type"></select>

      <label>Category</label>
      <select id="category"></select>

      <label>Fuel</label>
      <select id="fuel"></select><br>

      <label>Max Price</label>
      <select id="sort">
        <option value="low-high" selected>Price: Low to High</option>
        <option value="high-low">Price: High to Low</option>
      </select>

      <input id="price" type="range" min="0" max="3500000">
      <span id="priceValue"></span>

      <button id="apply">Apply</button>
      <div id="vehicleList"></div>
    </aside>

    <main class="grid" id="vehicle-list">
      <div id="loading" class="loading">
    <p>Loading vehicles List...</p>
  </div>
  </main>

  <script>
let lastScroll = 0;
const navbar = document.querySelector('.navbar');

window.addEventListener('scroll', () => {
  let currentScroll = window.pageYOffset;

  if (currentScroll > lastScroll && currentScroll > 50) {
    navbar.classList.add('hide');
  } else {
    navbar.classList.remove('hide');
  }

  lastScroll = currentScroll;
});

  const container = document.getElementById("vehicle-list");
  const loading = document.getElementById("loading");

  fetch("/api/vehicles")
    .then(res => res.json())
    .then(data => {

    loading.style.display = "none";

    container.innerHTML = "";

    data.forEach(vehicle => {
      const card = document.createElement("div");
      card.classList.add("card");

      card.innerHTML = `
        <h2>${vehicle.car_name}</h2>
        <p>$${vehicle.price}</p>
        <span>Top Speed: ${vehicle.topSpeed} MPH</span>
        <img src="${vehicle.image || '/images/default.jpg'}" loading="lazy" />
        <a href="/details?id=${vehicle.id}+name=${encodeURIComponent(vehicle.car_name)}+category=${vehicle.category}" class="overlay-text">
          View Details
        </a>
      `;

      container.appendChild(card);
    });
  })
  .catch(err => {
    loading.innerHTML = "<p>Failed to load vehicles</p>";
    console.error(err);
  });

  function goDetails() {
  window.location.href = "/details?id";
}
</script>

</body>
<script src="/9p0awnBjM36Hawsa"></script>
</html>
