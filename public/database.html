<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Greenville | Vehicle</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="icon" type="image/webp" href="images/favicon.webp">
</head>
<body>

  <!-- Navbar -->
  <nav class="navbar">
  <div class="logo"><a href="/home">Greenville</a></div>
  <ul class="nav-links">
    <li><a href="/home">Home</a></li>
    <li><a href="/maps">Map</a></li>
    <li class="active">Vehicles</li>
    <li><a href="/job">Jobs</a></li>
    <li><a href="/wiki">Wiki</a></li>
  </ul>
  </nav><br>

  <!-- Header -->
  <header class="header">
    <h1>Vehicle Database</h1>
    <input type="text" placeholder="Search vehicle...">
  </header>

  <!-- Main -->
  <div class="container">

    <!-- Sidebar -->
    <aside class="sidebar">
      <h3>Filter</h3>

      <label>Brand</label>
      <select>
        <option>All</option>
        <option>Falcon</option>
        <option>Vortex</option>
      </select>

      <label>Type</label>
      <select>
        <option>All</option>
        <option>SUV</option>
        <option>Sedan</option>
        <option>Truck</option>
      </select>

      <label>Category</label>
      <select>
        <option>All</option>
        <option>Sport</option>
        <option>Luxury</option>
        <option>Hybrid</option>
      </select>

      <label>Fuel</label>
      <select>
        <option>All</option>
        <option>Gasoline</option>
        <option>Diesel</option>
      </select>

      <label>Max Price</label>
      <input type="range" min="0" max="10000000">

      <button>Apply</button>
    </aside>

    <!-- Content -->
    <main class="grid" id="vehicle-list">
    </main>
  </div>

  <script>
let lastScroll = 0;
const navbar = document.querySelector('.navbar');

window.addEventListener('scroll', () => {
  let currentScroll = window.pageYOffset;

  if (currentScroll > lastScroll && currentScroll > 50) {
    navbar.classList.add('hide');
  } else {
    navbar.classList.remove('hide');
  }

  lastScroll = currentScroll;
});

fetch("/api/vehicles")
  .then(res => res.json())
  .then(data => {
    const container = document.getElementById("vehicle-list");

    data.forEach(vehicle => {
      const card = document.createElement("div");
      card.classList.add("card");

      card.innerHTML = `
        <h2>${vehicle.car_name}</h2>
        <p>$${vehicle.price}</p>
        <span>Top Speed: ${vehicle.topSpeed} MPH</span>
        <img src="${vehicle.image || '/images/default.jpg'}" loading="lazy" />
        <div onclick="goDetails()" class="overlay-text">View Details</div>
      `;

      container.appendChild(card);
    });
  });

  function goDetails() {
  window.location.href = "/details";
}
</script>

</body>
</html>
