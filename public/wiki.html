<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Greenville Wiki</title>
    <link rel="stylesheet" href="/style">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="icon" type="image/webp" href="images/favicon.webp">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
    html, body {
    height: 100%;
    overflow: hidden;
    }

    body {
    background: linear-gradient(#0b1120fb, #0b1120f6), url("images/background-overview.jpg") center/cover no-repeat;
    color: #ffffff;
    }

    .wiki-container {
    display: flex;
    width: 100%;
    height: 100vh;
    }

    .wiki-sidebar {
    display: flex;
    flex-direction: column;
    width: 320px;
    min-height: 100vh;
    position: sticky;
    top: 0;
    background: rgba(15,23,42,0.6);
    backdrop-filter: blur(10px);
    border-right: 1px solid #414651;
    border-radius: 0;
    padding: 20px;
    transition: width 0.25s ease, padding 0.25s ease;
    overflow: hidden;
    }

    .wiki-sidebar h2::after {
    content: "\f0c9";
    font-family: "Font Awesome 6 Free";
    font-weight: 900;
    font-size: 20px;
    cursor: pointer;
    transition: transform 0.25s ease, opacity 0.2s;
    transform-origin: center;
    }

    /* TITLE */
    .wiki-sidebar h2 {
    display: flex;
    align-items: center;
    font-family: 'Inter', sans-serif;
    margin: 20px 6px;
    margin-bottom: 12px;
    justify-content: space-between;
    }

    /* COLLAPSED STATE */
    .wiki-sidebar.collapsed {
    width: 70px;
    padding-top: 40px;
    color: #818ea1;
    }

    /* LOGO G */
    .wiki-sidebar.collapsed::before {
    content: "G";
    display: block;
    text-align: center;
    font-family: 'Inter', sans-serif;
    font-weight: bold;
    color: #ffffff;
    font-size: 22px;
    margin-bottom: 20px;
    }

    /* SEARCH ICON */
    .wiki-sidebar.collapsed::after {
    content: "\f002";
    font-family: "Font Awesome 6 Free";
    font-weight: 900;
    display: block;
    text-align: center;
    font-size: 16px;
    margin-bottom: 20px;
    }

    /* MENU DEFAULT */
    .menu li {
    position: relative;
    overflow: hidden;
    display: flex;
    align-items: center;
    gap: 20px;
    list-style: none;
    padding: 10px;
    border-radius: 8px;
    cursor: pointer;
    color: #818ea1;
    font-size: 17px;
    font-weight: 500;
    transition: all 0.2s ease;
    -webkit-user-select: none;
    -ms-user-select: none;
    user-select: none;
    }

    .menu li::before {
    content: none !important;
    }

    .menu li.wiki-active {
    position: relative;
    background: rgba(23, 40, 80, 0.6);
    color: #3b82f6;
    }

    .menu li.wiki-active::after {
    content: "";
    position: absolute;
    left: 0;
    top: 0;
    width: 3px;
    height: 100%;
    background: #2e66c0;
    border-radius: 2px;
    transform: scaleY(1) !important;
    }

    .menu li::after {
    content: "";
    position: absolute;
    left: 0;
    bottom: 0;
    width: 3px;
    height: 100%;
    background: #3b82f6;
    transform: scaleY(0);
    transform-origin: bottom;
    transition: transform 0.25s ease;
    }

    .menu li:hover {
    background: rgba(22, 33, 59, 0.6);
    color: #478dff;
    }

    .menu li:hover::after {
    transform: scaleY(1);
    }

    .wiki-sidebar.collapsed .menu li.wiki-active::after {
    height: 0;
    }

    /* COLLAPSED MENU */
    .wiki-sidebar.collapsed .menu li {
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 10px;
    height: 40px;
    padding: 0;
    gap: 0;
    font-size: 0;
    transition: all 0.2s ease;
    }

    /* ICON BASE */
    .wiki-sidebar.collapsed .menu li::before {
    font-family: "Font Awesome 6 Free";
    font-weight: 900;
    display: flex;
    align-items: center;
    justify-content: center;
    width: 100%;
    height: 100%;
    font-size: 18px;
    }

    .wiki-sidebar.collapsed .menu li:nth-child(1)::before {
    content: "\e3af" !important;
    }

    .wiki-sidebar.collapsed .menu li:nth-child(2)::before {
    content: "\f0c0" !important;
    }

    .wiki-sidebar.collapsed .menu li:nth-child(3)::before {
    content: "\23" !important;
    }

    .wiki-sidebar.collapsed .menu li:nth-child(4)::before {
    content: "\f059" !important;
    }

    .wiki-sidebar.collapsed .menu li:hover {
    scale: calc(1.2);
    }

    .wiki-sidebar.collapsed h2::after {
    transform: rotate(-90deg);
    }

    /* HIDE ELEMENTS */
    .wiki-sidebar.collapsed h2 {
    font-size: 0;
    margin-top: 8px;
    margin-bottom: 26px;
    display: flex;
    justify-content: center;
    align-items: center;
    cursor: pointer;
    }

    .wiki-sidebar.collapsed .search {
    display: none;
    }

    .wiki-sidebar.collapsed::before {
    order: 0;
    margin-bottom: 12px;
    }

    /* SEARCH (dibawah G) */
    .wiki-sidebar.collapsed::after {
    order: 1;
    margin-bottom: 16px;
    }

    /* MENU (dibawah search) */
    .wiki-sidebar .menu {
    order: 2;
    }

    .search {
    width: 100%;
    padding: 10px 12px;
    margin-top: 8px !important;
    margin-bottom: 20px;
    background: transparent !important;
    color: #ffffff !important;
    border: 1px solid #414651 !important;
    border-radius: 10px;
    outline: none;
    }

    .search::placeholder {
    color: #505663 !important;
    }

    .main-wrapper {
    flex: 1 1 0;
    display: flex;
    justify-content: center;
    min-width: 0;
    overflow-y: auto;
    margin-bottom: 100px;
    scroll-behavior: smooth;
    scrollbar-width: none;
    -ms-overflow-style: none;
    }

    .main-wrapper::-webkit-scrollbar {
    display: none;
    }

    /* MAIN */
    .main {
    width: 100%;
    max-width: 950px;
    padding: 40px;
    }

    /* UI */
    .title {
    font-family: 'Poppins', sans-serif;
    font-size: 28px;
    font-weight: bold;
    margin-bottom: 20px;
    }

    .box {
    border: 2.5px solid rgba(255,255,255,0.1);
    border-radius: 12px;
    padding: 15px 18px;
    background: rgba(15,23,42,0.6);
    margin-bottom: 20px;
    }

    #open-discuss {
    width: 100%;
    background: transparent;
    border: none;
    font-size: 18px;
    color: #ffffff;
    resize: none;
    height: 70px;
    outline: none;
    -webkit-user-select: none;
    -ms-user-select: none;
    user-select: none;
    }

    .actions {
    display: flex;
    gap: 10px;
    margin-top: 10px;
    flex-wrap: wrap;
    }

    .btn, .more-btn {
    display: flex;
    align-items: center;
    gap: 10px;
    }

    .btn {
    padding: 8px 16px;
    border-radius: 8px;
    border: 2.5px solid rgba(255,255,255,0.1);
    background: transparent;
    color: rgba(255,255,255,0.55);
    cursor: pointer;
    font-size: 14px;
    transition: all 0.1s ease;
    -webkit-user-select: none;
    -ms-user-select: none;
    user-select: none;
    }

    .btn i {
    font-size: 19px;
    }

    #post {
    margin-left: auto;
    border: none;
    margin-top: 5px;
    }

    .more-btn {
    padding: 7px 16px;
    border-radius: 8px;
    border: 2.5px solid rgba(255,255,255,0.1);
    background: rgba(15,23,42,0.6);
    font-weight: 500;
    color: rgba(255,255,255,0.55);
    cursor: pointer;
    font-size: 15px;
    transition: all 0.1s ease;
    -webkit-user-select: none;
    -ms-user-select: none;
    user-select: none;
    }

    .more-btn i {
    font-size: 15px;
    }

    #gn-idea {
    z-index: 10;
    }

    .dropdown {
    position: relative;
    display: inline-block;
    }

    .dropdown-menu {
    position: absolute;
    top: 100%;
    left: 0;
    right: auto;
    margin-top: -4px;
    background: rgba(15,23,42,0.95);
    color: #94a3b8;
    border: 1px solid rgba(255,255,255,0.1);
    border-top-left-radius: 0;
    border-top-right-radius: 0;
    border-bottom-left-radius: 10px;
    border-bottom-right-radius: 10px;
    padding: 10px;
    width: 100%;
    min-width: 160px;
    opacity: 0;
    transform: translateY(-10px);
    pointer-events: none;
    transition: all 0.25s ease;
    z-index: 0;
    }

    .dropdown-menu.active {
    opacity: 1;
    transform: translateY(0);
    pointer-events: auto;
    }

    .dropdown-menu p {
    padding: 8px;
    border-radius: 6px;
    cursor: pointer;
    }

    .dropdown-menu p i {
    margin-right: 9px;
    }

    .dropdown-menu p:hover {
    background: rgba(22, 33, 59, 0.6);
    color: #ffffffe7;
    }

    #up-down-dropdown {
    font-size: 12px;
    margin-top: 8px;
    transition: transform 0.25s ease;
    }

    #up-down-dropdown.rotate {
    transform: translateY(-7px) rotate(180deg);
    }

    .more-action {
    margin-left: 25px;
    display: flex;
    gap: 10px;
    margin-top: 10px;
    flex-wrap: wrap;
    }

    .btn:hover,
    .more-btn:hover {
    background: rgba(22, 33, 59, 0.6);
    color: #ffffffe7;
    }

    .headpost {
    margin-top: 25px;
    font-weight: bold;
    }

    .post {
    margin-top: 10px;
    border: 2.5px solid rgba(255,255,255,0.1);
    border-radius: 12px;
    padding: 12px;
    background: rgba(15,23,42,0.6);
    }

    .post-margin {
    margin: 2px 5px;
    }

    .post #recommend {
    color: rgba(255,255,255,0.65);
    margin-bottom: 10px;
    }

    #recommend i {
    margin-left: 5px;
    }

    .post small {
    color: #ffffff;
    font-weight: bold;
    font-size: 15px;
    margin-left: 6px;
    }

    .post-header {
    display: flex;
    align-items: center;
    }

    .like-btn {
    margin-left: auto; /* ini kunci → dorong ke kanan */
    margin-right: 8px;
    background: transparent;
    border: none;
    color: #94a3b8;
    cursor: pointer;
    font-size: 17px;
    }

    #post-date {
    color: #94a3b8;
    font-size: 12px;
    font-weight: 100;
    }

    #user {
    font-size: 32px;
    margin: 0px 2px;
    }

    .post #comment {
    margin-top: 12px;
    }

    .post-footer {
    display: flex;
    align-items: center;
    margin-top: 14px;
    margin-bottom: 6px;
    margin-left: 10px;
    gap: 30px;
    color: #758294;
    }

    #icon-repost {
    transform: rotate(90deg);
    }

    .post-footer i {
    font-size: 17px;
    line-height: 1;
    cursor: pointer;
    }

    .post-footer p {
    margin-top: 0px;
    margin-left: -20px;
    font-size: 15px;
    line-height: 1;
    cursor: pointer;
    }

    /* RIGHT */
    .right {
    width: 350px;
    flex-shrink: 0;
    position: sticky;
    top: 0;
    height: 100vh;
    padding: 40px 20px;
    }

    .panel {
    height: 300px;
    border-top-left-radius: 12px;
    border-bottom-left-radius: 12px;
    border-top-right-radius: 5px;
    border-bottom-right-radius: 5px;
    border: 1px solid rgba(255,255,255,0.1);
    background: rgba(15,23,42,0.6);
    }

    /* =========================
   <= 1100px (TABLET)
========================= */
@media (max-width: 1100px) {
  .right {
    display: none;
  }
}

/* =========================
   <= 800px (TABLET KECIL)
========================= */
@media (max-width: 800px) {
  .wiki-sidebar {
    display: none;
  }

  .main {
    padding: 20px;
  }
}

/* =========================
   <= 768px (MOBILE)
========================= */
@media (max-width: 768px) {

  .wiki-sidebar {
    display: flex;

    width: 100%;
    height: 65px;

    justify-content: flex-end; /* 🔥 bukan flex-end */
    align-items: center;
    padding: 0;
    border-top: 1px solid #414651;
    border-right: none;
    width: 100%;
    height: 65px;
    z-index: 9999;
    box-sizing: border-box;
  }

  /* SEMBUNYIKAN ELEMENT TIDAK PERLU */
  .wiki-sidebar h2,
  .wiki-sidebar .search {
    display: none;
  }

  /* MENU */
  .menu {
    display: flex;
    justify-content: space-around;
    align-items: center;

    width: 100%;
    height: 100%;
  }

  /* ITEM */
  .menu li {
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;

    gap: 4px;
    padding: 6px;

    font-size: 0;
    min-width: 60px; /* 🔥 biar rata */
  }

  /* ICON */
  .menu li i {
    font-size: 22px;
  }

  /* ACTIVE */
  .menu li.wiki-active {
    background: transparent;
  }

  .menu li.wiki-active i {
    color: #3b82f6;
  }

  /* HOVER OFF */
  .menu li:hover {
    background: transparent;
  }

  /* CONTENT SAFE AREA */
  .main {
    padding-bottom: 85px;
  }
}
  </style>
</head>
<body>
    <nav class="navbar">
    <div class="logo"><a href="/home">Greenville</a></div>
    <ul class="nav-links">
        <li><a href="/home">Home</a></li>
        <li><a href="/maps">Map</a></li>
        <li><a href="/vehicle">Vehicles</a></li>
        <li><a href="/job">Jobs</a></li>
        <li class="active">Wiki</li>
    </ul>
    </nav>

    <div class="wiki-container">

    <div class="wiki-sidebar">
    <h2>Greenville Wiki</h2>
    <input class="search" placeholder="Look for Trending topic...">
    <ul class="menu">
        <li class="wiki-active"><i class="fa-solid fa-house-chimney"></i>Home</li>
        <li><i class="fa-solid fa-users"></i>Community</li>
        <li><i class="fa-solid fa-hashtag"></i>Hot / Trending</li>
        <li><i class="fa-solid fa-circle-question"></i>Help</li>
    </ul>
  </div>

    <div class="main-wrapper">
        <div class="main">
            <div class="title">Discuss</div>

            <div class="box">
            <textarea id="open-discuss" placeholder="Ask something or mention '@' to open discussion.."></textarea>
            <div class="actions">
                <button class="btn" id="add-file" type="file">
                    <i class="fa-regular fa-square-plus"></i>
                    Add file
                </button>

                <button class="btn" id="post" onclick="addPost()">
                    <i class="fa-regular fa-circle-right"></i>
                </button>
            </div>
            </div>

            <div class="more-action">
            <button class="more-btn" id="discord" onclick="window.open('https://discord.gg/greenville')">
                <i class="fa-brands fa-discord"></i>
                Discord
            </button>

            <button class="more-btn" id="twitter">
                <i class="fa-brands fa-twitter"></i>
                Twitter
            </button>

            <div class="dropdown">
            <button class="more-btn" id="gn-idea">
                <i class="fa-regular fa-lightbulb"></i>
                Generate Idea
                <i class="fa-solid fa-sort-up" id="up-down-dropdown"></i>
            </button>

                <div class="dropdown-toggle" id="dropdownToggle">
                </div>
                <div class="dropdown-menu" id="dropdownMenu">
                    <p><i class="fa-solid fa-pen-to-square"></i>Next Update</p>
                    <p><i class="fa-solid fa-wrench"></i>Optimization</p>
                    <p><i class="fa-solid fa-car-rear"></i>New Vehicles</p>
                </div>
            </div>
            </div>

            <div class="headpost">Section</div>

            <div id="posts">
            <div class="post">
                <div class="post-margin">
                <p id="recommend">
                    Top: Today's Trending topic <i class="fa-solid fa-arrow-trend-up"></i>
                </p>

                <div class="post-header">
                    <i class="fa-solid fa-circle-user" id="user" ></i>
                    <div class="post-info">
                        <small>user826692</small><br>
                        <small id="post-date">an hour ago</small>
                    </div>
                    <button class="like-btn">
                    <i class="fa-regular fa-heart"></i>
                    </button>
                </div>

                <p id="comment">Can anyone tell me how to use this web?</p>
                </div>

                <div class="post-footer">
                    <i class="fa-regular fa-star"></i><p>58</p>
                    <i class="fa-solid fa-repeat" id="icon-repost"></i><p>Reply</p>
                    <i class="fa-regular fa-comment"></i><p>Comment</p>
                </div>
            </div>
            </div>
        </div>
    </div>

  <!-- RIGHT -->
  <div class="right">
    <div class="panel"></div>
  </div>
  </div>

    <script>
    const sidebar = document.querySelector('.wiki-sidebar');
    const toggleArea = document.querySelector('.wiki-sidebar h2');

    const btn = document.getElementById('gn-idea');
    const menu = document.getElementById('dropdownMenu');
    const icon = document.getElementById('up-down-dropdown');

    toggleArea.addEventListener('click', (e) => {
    e.stopPropagation();
    sidebar.classList.toggle('collapsed');
    });

    btn.addEventListener('click', (e) => {
    e.stopPropagation();
    menu.classList.toggle('active');
    icon.classList.toggle('rotate');
    });

    document.addEventListener('click', () => {
    menu.classList.remove('active');
    icon.classList.remove('rotate');
    });
    </script>
</body>
</html>
