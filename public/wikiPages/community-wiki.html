<!DOCTYPE html>
<html lang="en">
<head>

    <link rel="stylesheet" href="/style">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">

    <style>
    html, body {

    body {

<body>
    <nav class="navbar">

    <ul class="nav-links">
